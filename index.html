<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>NutriTrack</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F1B16">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg: #FAF6EF;
    --bg-elevated: #FFFFFF;
    --ink: #1F1B16;
    --ink-soft: #6B6258;
    --ink-faint: #A89F93;
    --line: #E7E0D4;
    --accent: #C4622D;
    --accent-soft: #F3DCC9;
    --good: #4D7A5A;
    --good-soft: #DCE9DD;
    --over: #B23B3B;
    --over-soft: #F6DADA;
    --track: #EFE8DA;
    --radius: 14px;
    --radius-sm: 9px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  .num{
    font-family: 'Roboto Mono', 'SF Mono', monospace;
    font-feature-settings: "tnum";
  }

  #app{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ---------- Top App Bar ---------- */
  .topbar{
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .topbar-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 8px;
  }
  .brand{
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .brand .dot{ color: var(--accent); }
  .icon-btn{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--bg-elevated);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink);
    font-size: 18px;
  }
  .icon-btn:active{ background: var(--line); }

  /* ---------- Date Nav ---------- */
  .date-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top: 12px;
    background: var(--bg-elevated);
    border-radius: 999px;
    padding: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .date-nav button{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .date-nav button:active{ background: var(--track); }
  .date-nav button:disabled{ opacity: 0.3; }
  .date-label{
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
  }
  .date-label .sub{
    display:block;
    font-weight: 500;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  /* ---------- Main scroll area ---------- */
  .view{
    flex: 1;
    padding: 16px 16px 100px;
  }
  .hidden{ display:none !important; }

  /* ---------- Section headers ---------- */
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin: 22px 0 10px;
  }
  .section-head:first-child{ margin-top: 4px; }
  .section-title{
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }
  .section-action{
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background:none; border:none;
    padding: 4px 0;
  }

  /* ---------- Nutrient Bars (signature element) ---------- */
  .bars-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    padding: 14px 16px 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .bar-row{
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  .bar-row:last-child{ border-bottom: none; }
  .bar-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
    gap: 8px;
  }
  .bar-name{
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .bar-pct{
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bar-pct.over{ color: var(--over); }
  .bar-pct.good{ color: var(--good); }
  .bar-pct.under{ color: var(--ink-soft); }
  .bar-track{
    position: relative;
    height: 9px;
    background: var(--track);
    border-radius: 5px;
    overflow: visible;
  }
  .bar-track-inner{
    position: relative;
    height: 100%;
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill{
    position: absolute;
    top:0; left:0; bottom:0;
    border-radius: 5px;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(.25,.8,.25,1);
  }
  .bar-fill.good{ background: var(--good); }
  .bar-fill.over{ background: var(--over); }
  /* When over 100%, the track itself extends past the row's normal bounds
     to physically represent the overage, with a tick mark at the 100% point */
  .bar-track .tick-100{
    position:absolute;
    top: -3px; bottom: -3px;
    width: 2px;
    background: var(--ink);
    opacity: 0.22;
    z-index: 2;
  }

  /* ---------- Written values list ---------- */
  .values-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .value-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
  }
  .value-row:last-child{ border-bottom: none; }
  .value-name{ font-size: 14.5px; font-weight: 500; }
  .value-amount{
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .value-amount .target{
    font-weight: 500;
    color: var(--ink-faint);
  }

  /* ---------- Food list ---------- */
  .food-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .food-row{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .food-row:last-child{ border-bottom: none; }
  .food-emoji{
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .food-info{ flex:1; min-width: 0; }
  .food-name{
    font-size: 14.5px;
    font-weight: 600;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .food-meta{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state{
    text-align:center;
    padding: 28px 16px;
    color: var(--ink-soft);
    font-size: 13.5px;
  }
  .empty-state .big{
    font-size: 26px;
    display:block;
    margin-bottom: 6px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    right: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 26px;
    box-shadow: 0 4px 14px rgba(196,98,45,0.4);
    display:flex; align-items:center; justify-content:center;
    z-index: 25;
    max-width: calc(560px - 40px);
  }
  .fab:active{ transform: scale(0.94); }

  /* ---------- Bottom Nav ---------- */
  .bottom-nav{
    position: sticky;
    bottom: 0;
    z-index: 20;
    background: var(--bg-elevated);
    border-top: 1px solid var(--line);
    display:flex;
    padding-bottom: var(--safe-bottom);
  }
  .nav-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 3px;
    padding: 10px 0 8px;
    background:none;
    border:none;
    color: var(--ink-faint);
    font-size: 11px;
    font-weight: 600;
  }
  .nav-item.active{ color: var(--accent); }
  .nav-item .nav-icon{ font-size: 19px; }

  /* ---------- Edit page ---------- */
  .form-section{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 4px 16px;
    margin-bottom: 18px;
  }
  .form-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .form-row:last-child{ border-bottom: none; }
  .form-label{
    font-size: 14.5px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .form-input-wrap{
    display:flex;
    align-items:baseline;
    gap: 6px;
  }
  .form-input{
    width: 84px;
    text-align: right;
    border: none;
    background: transparent;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    font-family: 'Roboto Mono', monospace;
    padding: 4px 0;
  }
  .form-input:focus{ outline: none; }
  .form-unit{
    font-size: 13px;
    color: var(--ink-soft);
    width: 28px;
  }

  .food-entry-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .food-entry-top{
    display:flex;
    gap: 10px;
    align-items:flex-start;
  }
  .food-entry-name{
    flex:1;
    border:none;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
  }
  .food-entry-name:focus{ outline: 2px solid var(--accent-soft); }
  .food-entry-remove{
    width: 38px; height: 38px;
    border-radius: var(--radius-sm);
    border:none;
    background: var(--over-soft);
    color: var(--over);
    font-size: 16px;
    flex-shrink:0;
  }
  .food-entry-nutrients{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip-input{
    display:flex;
    align-items:center;
    background: var(--bg);
    border-radius: 999px;
    padding: 6px 4px 6px 12px;
    gap: 4px;
  }
  .chip-input label{
    font-size: 11.5px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .chip-input input{
    width: 44px;
    border:none;
    background:transparent;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Roboto Mono', monospace;
    color: var(--ink);
    text-align: right;
    padding: 2px;
  }
  .chip-input input:focus{ outline:none; }
  .chip-input .u{
    font-size: 11px;
    color: var(--ink-faint);
    padding-right: 8px;
  }

  .add-food-btn{
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: 1.5px dashed var(--ink-faint);
    background: transparent;
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .add-food-btn:active{ background: var(--line); }

  .save-bar{
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 12px 16px calc(12px + var(--safe-bottom));
    margin: 0 -16px -100px;
    border-top: 1px solid var(--line);
  }
  .btn-primary{
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15.5px;
    font-weight: 700;
  }
  .btn-primary:active{ opacity: 0.85; }

  /* ---------- Settings page ---------- */
  .settings-group-title{
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 22px 4px 10px;
  }
  .settings-group-title:first-child{ margin-top: 4px; }
  .nutrient-setting-row{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
  }
  .nutrient-setting-row:last-child{ border-bottom: none; }
  .nutrient-setting-name{
    flex: 1;
    font-size: 14px;
    font-weight: 600;
  }
  .nutrient-setting-row input{
    width: 64px;
    text-align: right;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Roboto Mono', monospace;
    background: var(--bg);
    color: var(--ink);
  }
  .nutrient-setting-row input:focus{ outline: none; border-color: var(--accent); }
  .nutrient-setting-unit{
    font-size: 12.5px;
    color: var(--ink-soft);
    width: 24px;
  }
  .remove-nutrient-btn{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--over-soft);
    color: var(--over);
    font-size: 14px;
    flex-shrink: 0;
  }

  .add-nutrient-row{
    display:flex;
    gap: 8px;
    padding: 12px 16px;
  }
  .add-nutrient-row input{
    flex:1;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
  }
  .add-nutrient-row input:focus{ outline:none; border-color: var(--accent); }
  .add-nutrient-row select{
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 13px;
    background: var(--bg);
    color: var(--ink);
  }
  .add-nutrient-row button{
    width: 42px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    font-weight: 700;
  }

  .settings-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  .reset-link{
    display:block;
    text-align:center;
    color: var(--over);
    font-size: 13.5px;
    font-weight: 600;
    padding: 16px;
    background: none;
    border: none;
    width: 100%;
  }

  /* Toast */
  .toast{
    position: fixed;
    bottom: calc(90px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: white;
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    max-width: calc(100% - 48px);
    text-align: center;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <div class="brand" id="pageTitle">Nutri<span class="dot">Track</span></div>
      <button class="icon-btn hidden" id="editBtn" aria-label="Edit day">✎</button>
    </div>
    <div class="date-nav" id="dateNav">
      <button id="prevDayBtn" aria-label="Previous day">‹</button>
      <div class="date-label" id="dateLabel">
        Today
        <span class="sub" id="dateSub">—</span>
      </div>
      <button id="nextDayBtn" aria-label="Next day">›</button>
    </div>
  </div>

  <!-- ============ DAILY VIEW ============ -->
  <div class="view" id="view-daily">
    <div class="section-head">
      <div class="section-title">Today's intake</div>
    </div>
    <div class="bars-card" id="barsCard"></div>

    <div class="section-head">
      <div class="section-title">Values</div>
    </div>
    <div class="values-card" id="valuesCard"></div>

    <div class="section-head">
      <div class="section-title">Foods eaten</div>
    </div>
    <div class="food-card" id="foodCard"></div>
  </div>

  <!-- ============ EDIT VIEW ============ -->
  <div class="view hidden" id="view-edit">
    <div class="settings-group-title">Foods eaten</div>
    <div id="foodEntries"></div>
    <button class="add-food-btn" id="addFoodBtn">+ Add food</button>

    <div class="settings-group-title">Daily totals</div>
    <div class="form-section" id="nutrientForm"></div>

    <div class="save-bar">
      <button class="btn-primary" id="saveEditBtn">Save changes</button>
    </div>
  </div>

  <!-- ============ SETTINGS VIEW ============ -->
  <div class="view hidden" id="view-settings">
    <div class="settings-group-title">Daily targets</div>
    <div class="settings-card" id="targetsCard"></div>

    <div class="settings-group-title">Add a nutrient</div>
    <div class="settings-card">
      <div class="add-nutrient-row">
        <input type="text" id="newNutrientName" placeholder="e.g. Vitamin D">
        <select id="newNutrientUnit">
          <option value="g">g</option>
          <option value="mg">mg</option>
          <option value="mcg">mcg</option>
          <option value="kcal">kcal</option>
          <option value="ml">ml</option>
        </select>
        <button id="addNutrientBtn">+</button>
      </div>
    </div>

    <div class="settings-group-title">Data</div>
    <div class="settings-card">
      <button class="reset-link" id="resetDataBtn">Erase all data</button>
    </div>
  </div>

  <!-- ============ BOTTOM NAV ============ -->
  <div class="bottom-nav">
    <button class="nav-item active" data-tab="daily">
      <span class="nav-icon">📊</span>
      Daily
    </button>
    <button class="nav-item" data-tab="settings">
      <span class="nav-icon">⚙️</span>
      Settings
    </button>
  </div>

  <button class="fab hidden" id="fabEdit" aria-label="Edit today">✎</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   NutriTrack — app logic
   Data model:
   - localStorage["nutritrack_targets"]  -> { id: {name, unit, target} }
   - localStorage["nutritrack_days"]     -> { "YYYY-MM-DD": { foods: [{name, nutrients:{id:amount}}], totals: {id:amount} } }
   totals are DERIVED from foods when foods exist, but a day can also
   have manually-entered totals with no foods (quick logging).
   ========================================================= */

const STORAGE_TARGETS = 'nutritrack_targets';
const STORAGE_DAYS = 'nutritrack_days';

const DEFAULT_TARGETS = {
  energy:   { name: 'Energy',        unit: 'kcal', target: 2100 },
  protein:  { name: 'Protein',       unit: 'g',    target: 50 },
  carbs:    { name: 'Carbohydrate',  unit: 'g',    target: 275 },
  sugar:    { name: 'Sugars',        unit: 'g',    target: 90 },
  fibre:    { name: 'Fibre',         unit: 'g',    target: 30 },
  fat:      { name: 'Total fat',     unit: 'g',    target: 70 },
  satfat:   { name: 'Saturated fat', unit: 'g',    target: 24 },
  sodium:   { name: 'Sodium',        unit: 'mg',   target: 2000 },
  calcium:  { name: 'Calcium',       unit: 'mg',   target: 1000 },
  iron:     { name: 'Iron',          unit: 'mg',   target: 8 },
};

let state = {
  targets: {},
  days: {},
  currentDate: todayStr(),
  activeTab: 'daily',
  editingFoods: [],        // working copy of foods while in edit view
  editingManualTotals: {}, // working copy of manual totals when no foods logged
};

/* ---------- date helpers ---------- */
function todayStr(){
  return formatDateKey(new Date());
}
function formatDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDateKey(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(dateKey, n){
  const d = parseDateKey(dateKey);
  d.setDate(d.getDate()+n);
  return formatDateKey(d);
}
function prettyDate(dateKey){
  const d = parseDateKey(dateKey);
  const todayKey = todayStr();
  const yestKey = addDays(todayKey, -1);
  if(dateKey === todayKey) return { main: 'Today', sub: longDate(d) };
  if(dateKey === yestKey) return { main: 'Yesterday', sub: longDate(d) };
  const tmrwKey = addDays(todayKey, 1);
  if(dateKey === tmrwKey) return { main: 'Tomorrow', sub: longDate(d) };
  return { main: weekday(d), sub: longDate(d) };
}
function weekday(d){
  return d.toLocaleDateString('en-AU', { weekday: 'long' });
}
function longDate(d){
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

/* ---------- persistence ---------- */
function loadState(){
  try{
    const t = localStorage.getItem(STORAGE_TARGETS);
    state.targets = t ? JSON.parse(t) : structuredCloneSafe(DEFAULT_TARGETS);
  }catch(e){ state.targets = structuredCloneSafe(DEFAULT_TARGETS); }

  try{
    const d = localStorage.getItem(STORAGE_DAYS);
    state.days = d ? JSON.parse(d) : {};
  }catch(e){ state.days = {}; }

  if(!localStorage.getItem(STORAGE_TARGETS)){
    saveTargets();
  }
}
function structuredCloneSafe(obj){ return JSON.parse(JSON.stringify(obj)); }
function saveTargets(){
  localStorage.setItem(STORAGE_TARGETS, JSON.stringify(state.targets));
}
function saveDays(){
  localStorage.setItem(STORAGE_DAYS, JSON.stringify(state.days));
}
function getDay(dateKey){
  return state.days[dateKey] || { foods: [], totals: {} };
}
function setDay(dateKey, dayData){
  state.days[dateKey] = dayData;
  saveDays();
}

/* ---------- nutrient totals computation ---------- */
function computeTotalsFromFoods(foods){
  const totals = {};
  for(const food of foods){
    for(const [nid, amt] of Object.entries(food.nutrients || {})){
      const n = parseFloat(amt);
      if(!isNaN(n)){
        totals[nid] = (totals[nid] || 0) + n;
      }
    }
  }
  return totals;
}
function getEffectiveTotals(dayData){
  // If there are foods logged, derive totals from them.
  // Otherwise fall back to manually entered totals.
  if(dayData.foods && dayData.foods.length > 0){
    return computeTotalsFromFoods(dayData.foods);
  }
  return dayData.totals || {};
}

/* ---------- toast ---------- */
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

/* =========================================================
   RENDER: Daily view
   ========================================================= */
function renderDateNav(){
  const { main, sub } = prettyDate(state.currentDate);
  document.getElementById('dateLabel').innerHTML = `${main}<span class="sub" id="dateSub">${sub}</span>`;
  const nextBtn = document.getElementById('nextDayBtn');
  nextBtn.disabled = state.currentDate >= todayStr();
}

function pctClass(pct){
  if(pct > 100) return 'over';
  if(pct >= 70) return 'good';
  return 'under';
}

function renderBars(){
  const dayData = getDay(state.currentDate);
  const totals = getEffectiveTotals(dayData);
  const card = document.getElementById('barsCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = `<div class="empty-state"><span class="big">⚙️</span>Add nutrients to track in Settings</div>`;
    return;
  }

  card.innerHTML = ids.map(id => {
    const t = state.targets[id];
    const val = totals[id] || 0;
    const pct = t.target > 0 ? (val / t.target) * 100 : 0;
    const cls = pctClass(pct);
    const displayPct = Math.round(pct);
    const overflowing = pct > 100;

    // Scale: when under/at 100%, the track's full width IS 100%.
    // When over, the track's full width represents the actual pct,
    // so the bar always fills edge-to-edge and a tick mark shows
    // where 100% sits — making overage visible as "tick partway along".
    const scaleMax = Math.max(pct, 100);
    const fillWidth = (pct / scaleMax) * 100;
    const tickLeft = (100 / scaleMax) * 100;

    return `
      <div class="bar-row">
        <div class="bar-top">
          <span class="bar-name">${escapeHtml(t.name)}</span>
          <span class="bar-pct ${cls}">${displayPct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-track-inner">
            <div class="bar-fill ${cls}" style="width:${fillWidth}%"></div>
          </div>
          ${overflowing ? `<div class="tick-100" style="left:${tickLeft}%"></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderValues(){
  const dayData = getDay(state.currentDate);
  const totals = getEffectiveTotals(dayData);
  const card = document.getElementById('valuesCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = '';
    return;
  }

  card.innerHTML = ids.map(id => {
    const t = state.targets[id];
    const val = totals[id] || 0;
    return `
      <div class="value-row">
        <span class="value-name">${escapeHtml(t.name)}</span>
        <span class="value-amount">${formatAmount(val)}${escapeHtml(t.unit)} <span class="target">/ ${formatAmount(t.target)}${escapeHtml(t.unit)}</span></span>
      </div>
    `;
  }).join('');
}

function formatAmount(n){
  if(n === undefined || n === null || isNaN(n)) return '0';
  const rounded = Math.round(n * 10) / 10;
  return rounded % 1 === 0 ? String(rounded) : rounded.toFixed(1);
}

function renderFoods(){
  const dayData = getDay(state.currentDate);
  const card = document.getElementById('foodCard');

  if(!dayData.foods || dayData.foods.length === 0){
    card.innerHTML = `<div class="empty-state"><span class="big">🍽️</span>No foods logged yet</div>`;
    return;
  }

  card.innerHTML = dayData.foods.map(food => {
    const nutrientBits = Object.entries(food.nutrients || {})
      .filter(([id, amt]) => state.targets[id] && parseFloat(amt) > 0)
      .map(([id, amt]) => `${formatAmount(amt)}${state.targets[id].unit} ${state.targets[id].name.toLowerCase()}`)
      .join(' · ');
    return `
      <div class="food-row">
        <div class="food-emoji">🍴</div>
        <div class="food-info">
          <div class="food-name">${escapeHtml(food.name)}</div>
          <div class="food-meta">${nutrientBits || 'No nutrients logged'}</div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function renderDailyView(){
  renderDateNav();
  renderBars();
  renderValues();
  renderFoods();
}

/* =========================================================
   RENDER: Edit view
   ========================================================= */
function openEditView(){
  const dayData = getDay(state.currentDate);
  // Work from a deep copy of existing foods
  state.editingFoods = dayData.foods && dayData.foods.length > 0
    ? JSON.parse(JSON.stringify(dayData.foods))
    : [];
  state.editingManualTotals = !dayData.foods || dayData.foods.length === 0
    ? JSON.parse(JSON.stringify(dayData.totals || {}))
    : {};

  renderFoodEntries();
  renderNutrientForm();
  switchView('edit');
}

function renderFoodEntries(){
  const wrap = document.getElementById('foodEntries');
  const ids = Object.keys(state.targets);

  if(state.editingFoods.length === 0){
    wrap.innerHTML = `<div class="empty-state" style="background:var(--bg-elevated); border-radius:var(--radius); margin-bottom:12px;"><span class="big">🍴</span>No foods yet — add one below</div>`;
    return;
  }

  wrap.innerHTML = state.editingFoods.map((food, idx) => {
    const chips = ids.map(id => {
      const t = state.targets[id];
      const val = food.nutrients && food.nutrients[id] != null ? food.nutrients[id] : '';
      return `
        <div class="chip-input">
          <label>${escapeHtml(t.name)}</label>
          <input type="number" inputmode="decimal" step="any" min="0"
            data-food-idx="${idx}" data-nutrient-id="${id}"
            class="food-nutrient-input"
            value="${val}" placeholder="0">
          <span class="u">${escapeHtml(t.unit)}</span>
        </div>
      `;
    }).join('');

    return `
      <div class="food-entry-card">
        <div class="food-entry-top">
          <input type="text" class="food-entry-name" data-food-idx="${idx}"
            value="${escapeHtml(food.name)}" placeholder="Food name">
          <button class="food-entry-remove" data-remove-idx="${idx}">✕</button>
        </div>
        <div class="food-entry-nutrients">${chips}</div>
      </div>
    `;
  }).join('');

  // bind events
  wrap.querySelectorAll('.food-entry-name').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.foodIdx);
      state.editingFoods[idx].name = e.target.value;
    });
  });
  wrap.querySelectorAll('.food-nutrient-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.foodIdx);
      const nid = e.target.dataset.nutrientId;
      if(!state.editingFoods[idx].nutrients) state.editingFoods[idx].nutrients = {};
      state.editingFoods[idx].nutrients[nid] = e.target.value === '' ? 0 : parseFloat(e.target.value);
    });
  });
  wrap.querySelectorAll('[data-remove-idx]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.removeIdx);
      state.editingFoods.splice(idx, 1);
      renderFoodEntries();
      renderNutrientForm();
    });
  });
}

function renderNutrientForm(){
  const form = document.getElementById('nutrientForm');
  const ids = Object.keys(state.targets);
  const hasFoods = state.editingFoods.length > 0;

  if(ids.length === 0){
    form.innerHTML = `<div class="empty-state">Add nutrients to track in Settings</div>`;
    return;
  }

  if(hasFoods){
    // totals are derived & read-only, shown for confirmation
    const totals = computeTotalsFromFoods(state.editingFoods);
    form.innerHTML = ids.map(id => {
      const t = state.targets[id];
      const val = totals[id] || 0;
      return `
        <div class="form-row">
          <span class="form-label">${escapeHtml(t.name)}</span>
          <div class="form-input-wrap">
            <span class="form-input" style="color:var(--ink-soft);">${formatAmount(val)}</span>
            <span class="form-unit">${escapeHtml(t.unit)}</span>
          </div>
        </div>
      `;
    }).join('') + `<div class="form-row" style="border-top:1px solid var(--line); padding-top:10px;"><span class="form-label" style="color:var(--ink-faint); font-size:12.5px;">Totals are calculated from foods listed above</span></div>`;
  } else {
    form.innerHTML = ids.map(id => {
      const t = state.targets[id];
      const val = state.editingManualTotals[id] != null ? state.editingManualTotals[id] : '';
      return `
        <div class="form-row">
          <span class="form-label">${escapeHtml(t.name)}</span>
          <div class="form-input-wrap">
            <input type="number" inputmode="decimal" step="any" min="0" class="form-input manual-total-input"
              data-nutrient-id="${id}" value="${val}" placeholder="0">
            <span class="form-unit">${escapeHtml(t.unit)}</span>
          </div>
        </div>
      `;
    }).join('');

    form.querySelectorAll('.manual-total-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const nid = e.target.dataset.nutrientId;
        state.editingManualTotals[nid] = e.target.value === '' ? 0 : parseFloat(e.target.value);
      });
    });
  }
}

function addFoodEntry(){
  state.editingFoods.push({ name: '', nutrients: {} });
  renderFoodEntries();
  renderNutrientForm();
  // focus the new entry's name field
  setTimeout(() => {
    const inputs = document.querySelectorAll('.food-entry-name');
    const last = inputs[inputs.length - 1];
    if(last) last.focus();
  }, 50);
}

function saveEditView(){
  const cleanedFoods = state.editingFoods
    .filter(f => f.name && f.name.trim().length > 0)
    .map(f => ({ name: f.name.trim(), nutrients: f.nutrients || {} }));

  const dayData = {
    foods: cleanedFoods,
    totals: cleanedFoods.length === 0 ? (state.editingManualTotals || {}) : {}
  };
  setDay(state.currentDate, dayData);
  showToast('Saved');
  switchView('daily');
  renderDailyView();
}

/* =========================================================
   RENDER: Settings view
   ========================================================= */
function renderSettings(){
  const card = document.getElementById('targetsCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = `<div class="empty-state">No nutrients yet — add one below</div>`;
    return;
  }

  card.innerHTML = ids.map(id => {
    const t = state.targets[id];
    return `
      <div class="nutrient-setting-row">
        <span class="nutrient-setting-name">${escapeHtml(t.name)}</span>
        <input type="number" inputmode="decimal" step="any" min="0"
          data-target-id="${id}" class="target-input" value="${t.target}">
        <span class="nutrient-setting-unit">${escapeHtml(t.unit)}</span>
        <button class="remove-nutrient-btn" data-remove-target="${id}">✕</button>
      </div>
    `;
  }).join('');

  card.querySelectorAll('.target-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = e.target.dataset.targetId;
      const v = parseFloat(e.target.value);
      state.targets[id].target = isNaN(v) ? 0 : v;
      saveTargets();
    });
  });
  card.querySelectorAll('[data-remove-target]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.dataset.removeTarget;
      const name = state.targets[id].name;
      if(confirm(`Remove "${name}" from tracked nutrients? Past logged amounts for it will be hidden but not deleted.`)){
        delete state.targets[id];
        saveTargets();
        renderSettings();
      }
    });
  });
}

function addNutrientFromSettings(){
  const nameInput = document.getElementById('newNutrientName');
  const unitSelect = document.getElementById('newNutrientUnit');
  const name = nameInput.value.trim();
  if(!name){
    showToast('Enter a nutrient name');
    return;
  }
  const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') + '_' + Date.now().toString(36);
  state.targets[id] = { name, unit: unitSelect.value, target: 0 };
  saveTargets();
  nameInput.value = '';
  renderSettings();
  showToast(`Added ${name}`);
}

function resetAllData(){
  if(confirm('This will erase all logged days and reset targets to defaults. This cannot be undone. Continue?')){
    localStorage.removeItem(STORAGE_TARGETS);
    localStorage.removeItem(STORAGE_DAYS);
    loadState();
    renderDailyView();
    renderSettings();
    showToast('All data erased');
    switchView('daily');
  }
}

/* =========================================================
   View / Tab switching
   ========================================================= */
function switchView(view){
  // view: 'daily' | 'edit' | 'settings'
  document.getElementById('view-daily').classList.toggle('hidden', view !== 'daily');
  document.getElementById('view-edit').classList.toggle('hidden', view !== 'edit');
  document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');

  document.getElementById('dateNav').classList.toggle('hidden', view === 'settings');
  document.getElementById('editBtn').classList.toggle('hidden', view !== 'daily');
  document.getElementById('fabEdit').classList.toggle('hidden', view !== 'daily');

  const titleEl = document.getElementById('pageTitle');
  if(view === 'edit'){
    titleEl.innerHTML = 'Edit day';
  } else if(view === 'settings'){
    titleEl.innerHTML = 'Settings';
  } else {
    titleEl.innerHTML = 'Nutri<span class="dot">Track</span>';
  }

  document.querySelectorAll('.nav-item').forEach(btn => {
    const tab = btn.dataset.tab;
    const isActive = (view === 'daily' && tab === 'daily') || (view === 'settings' && tab === 'settings');
    btn.classList.toggle('active', isActive);
  });

  if(view === 'settings'){
    state.activeTab = 'settings';
  } else if(view === 'daily'){
    state.activeTab = 'daily';
  }
}

/* =========================================================
   Init & event bindings
   ========================================================= */
function init(){
  loadState();
  renderDailyView();
  renderSettings();
  switchView('daily');

  document.getElementById('prevDayBtn').addEventListener('click', () => {
    state.currentDate = addDays(state.currentDate, -1);
    renderDailyView();
  });
  document.getElementById('nextDayBtn').addEventListener('click', () => {
    if(state.currentDate < todayStr()){
      state.currentDate = addDays(state.currentDate, 1);
      renderDailyView();
    }
  });

  document.getElementById('editBtn').addEventListener('click', openEditView);
  document.getElementById('fabEdit').addEventListener('click', openEditView);
  document.getElementById('addFoodBtn').addEventListener('click', addFoodEntry);
  document.getElementById('saveEditBtn').addEventListener('click', saveEditView);

  document.getElementById('addNutrientBtn').addEventListener('click', addNutrientFromSettings);
  document.getElementById('resetDataBtn').addEventListener('click', resetAllData);

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      if(tab === 'daily'){
        renderDailyView();
        switchView('daily');
      } else if(tab === 'settings'){
        renderSettings();
        switchView('settings');
      }
    });
  });

  // swipe between days on the daily view
  let touchStartX = null;
  const dailyView = document.getElementById('view-daily');
  dailyView.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  dailyView.addEventListener('touchend', e => {
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 60){
      if(dx < 0 && state.currentDate < todayStr()){
        state.currentDate = addDays(state.currentDate, 1);
        renderDailyView();
      } else if(dx > 0){
        state.currentDate = addDays(state.currentDate, -1);
        renderDailyView();
      }
    }
    touchStartX = null;
  }, { passive: true });

  // register service worker for installability
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

document.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
