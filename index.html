<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>NutriTrack</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F1B16">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg: #FAF6EF;
    --bg-elevated: #FFFFFF;
    --ink: #1F1B16;
    --ink-soft: #6B6258;
    --ink-faint: #A89F93;
    --line: #E7E0D4;
    --accent: #C4622D;
    --accent-soft: #F3DCC9;
    --good: #4D7A5A;
    --good-soft: #DCE9DD;
    --over: #B23B3B;
    --over-soft: #F6DADA;
    --track: #EFE8DA;
    --radius: 14px;
    --radius-sm: 9px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  .num{
    font-family: 'Roboto Mono', 'SF Mono', monospace;
    font-feature-settings: "tnum";
  }

  #app{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ---------- Top App Bar ---------- */
  .topbar{
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .topbar-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 8px;
  }
  .brand{
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .brand .dot{ color: var(--accent); }
  .icon-btn{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--bg-elevated);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink);
    font-size: 18px;
  }
  .icon-btn:active{ background: var(--line); }

  /* ---------- Date Nav ---------- */
  .date-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top: 12px;
    background: var(--bg-elevated);
    border-radius: 999px;
    padding: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .date-nav button{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .date-nav button:active{ background: var(--track); }
  .date-nav button:disabled{ opacity: 0.3; }
  .date-label{
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
  }
  .date-label .sub{
    display:block;
    font-weight: 500;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  /* ---------- Main scroll area ---------- */
  .view{
    flex: 1;
    padding: 16px 16px 100px;
  }
  .hidden{ display:none !important; }

  /* ---------- Section headers ---------- */
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin: 22px 0 10px;
  }
  .section-head:first-child{ margin-top: 4px; }
  .section-title{
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }
  .section-action{
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background:none; border:none;
    padding: 4px 0;
  }

  /* ---------- Nutrient Bars (signature element) ---------- */
  .bars-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    padding: 14px 16px 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .bar-row{
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  .bar-row:last-child{ border-bottom: none; }
  .bar-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
    gap: 8px;
  }
  .bar-name{
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .bar-pct{
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bar-pct.over{ color: var(--over); }
  .bar-pct.good{ color: var(--good); }
  .bar-pct.under{ color: var(--ink-soft); }
  .bar-track{
    position: relative;
    height: 9px;
    background: var(--track);
    border-radius: 5px;
    overflow: visible;
  }
  .bar-track-inner{
    position: relative;
    height: 100%;
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill{
    position: absolute;
    top:0; left:0; bottom:0;
    border-radius: 5px;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(.25,.8,.25,1);
  }
  .bar-fill.good{ background: var(--good); }
  .bar-fill.over{ background: var(--over); }
  /* When over 100%, the track itself extends past the row's normal bounds
     to physically represent the overage, with a tick mark at the 100% point */
  .bar-track .tick-100{
    position:absolute;
    top: -3px; bottom: -3px;
    width: 2px;
    background: var(--ink);
    opacity: 0.22;
    z-index: 2;
  }

  /* ---------- Written values list ---------- */
  .values-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .value-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
  }
  .value-row:last-child{ border-bottom: none; }
  .value-name{ font-size: 14.5px; font-weight: 500; }
  .value-amount{
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .value-amount .target{
    font-weight: 500;
    color: var(--ink-faint);
  }

  /* ---------- Food list ---------- */
  .food-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .food-row{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .food-row:last-child{ border-bottom: none; }
  .food-emoji{
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .food-info{ flex:1; min-width: 0; }
  .food-name{
    font-size: 14.5px;
    font-weight: 600;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .food-meta{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state{
    text-align:center;
    padding: 28px 16px;
    color: var(--ink-soft);
    font-size: 13.5px;
  }
  .empty-state .big{
    font-size: 26px;
    display:block;
    margin-bottom: 6px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    right: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 26px;
    box-shadow: 0 4px 14px rgba(196,98,45,0.4);
    display:flex; align-items:center; justify-content:center;
    z-index: 25;
    max-width: calc(560px - 40px);
  }
  .fab:active{ transform: scale(0.94); }

  /* ---------- Bottom Nav ---------- */
  .bottom-nav{
    position: sticky;
    bottom: 0;
    z-index: 20;
    background: var(--bg-elevated);
    border-top: 1px solid var(--line);
    display:flex;
    padding-bottom: var(--safe-bottom);
  }
  .nav-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 3px;
    padding: 10px 0 8px;
    background:none;
    border:none;
    color: var(--ink-faint);
    font-size: 11px;
    font-weight: 600;
  }
  .nav-item.active{ color: var(--accent); }
  .nav-item .nav-icon{ font-size: 19px; }

  /* ---------- Edit page ---------- */
  .form-section{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 4px 16px;
    margin-bottom: 18px;
  }
  .form-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .form-row:last-child{ border-bottom: none; }
  .form-label{
    font-size: 14.5px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .form-input-wrap{
    display:flex;
    align-items:baseline;
    gap: 6px;
  }
  .form-input{
    width: 84px;
    text-align: right;
    border: none;
    background: transparent;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    font-family: 'Roboto Mono', monospace;
    padding: 4px 0;
  }
  .form-input:focus{ outline: none; }
  .form-unit{
    font-size: 13px;
    color: var(--ink-soft);
    width: 28px;
  }

  .food-entry-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .food-entry-name{
    flex:1;
    border:none;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
  }
  .food-entry-name:focus{ outline: 2px solid var(--accent-soft); }
  .food-entry-nutrients{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip-input{
    display:flex;
    align-items:center;
    background: var(--bg);
    border-radius: 999px;
    padding: 6px 4px 6px 12px;
    gap: 4px;
  }
  .chip-input label{
    font-size: 11.5px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .chip-input input{
    width: 44px;
    border:none;
    background:transparent;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Roboto Mono', monospace;
    color: var(--ink);
    text-align: right;
    padding: 2px;
  }
  .chip-input input:focus{ outline:none; }
  .chip-input .u{
    font-size: 11px;
    color: var(--ink-faint);
    padding-right: 8px;
  }

  .add-food-btn{
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: 1.5px dashed var(--ink-faint);
    background: transparent;
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .add-food-btn:active{ background: var(--line); }

  .save-bar{
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 12px 16px calc(12px + var(--safe-bottom));
    margin: 0 -16px -100px;
    border-top: 1px solid var(--line);
  }
  .btn-primary{
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15.5px;
    font-weight: 700;
  }
  .btn-primary:active{ opacity: 0.85; }

  /* ---------- Settings page ---------- */
  .settings-tabs{
    display:flex;
    gap: 4px;
    background: var(--track);
    border-radius: 11px;
    padding: 4px;
    margin: 4px 0 18px;
  }
  .settings-tab{
    flex: 1;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight: 700;
    padding: 9px 0;
    border-radius: 8px;
  }
  .settings-tab.active{
    background: var(--bg-elevated);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .settings-panel.hidden{ display: none; }

  .settings-group-title{
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 22px 4px 10px;
  }
  .settings-group-title:first-child{ margin-top: 4px; }
  .nutrient-setting-row{
    display:flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .nutrient-setting-row:last-child{ border-bottom: none; }
  .nutrient-setting-top{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .reorder-stack{
    display:flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .reorder-btn{
    width: 22px; height: 18px;
    border: none;
    background: var(--bg);
    border-radius: 4px;
    color: var(--ink-soft);
    font-size: 9px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .reorder-btn:disabled{ opacity: 0.25; }
  .reorder-btn:active:not(:disabled){ background: var(--track); }
  .nutrient-setting-name{
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nutrient-setting-row input{
    width: 64px;
    text-align: right;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Roboto Mono', monospace;
    background: var(--bg);
    color: var(--ink);
  }
  .nutrient-setting-row input:focus{ outline: none; border-color: var(--accent); }
  .nutrient-setting-unit{
    font-size: 12.5px;
    color: var(--ink-soft);
    width: 24px;
  }
  .remove-nutrient-btn{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--over-soft);
    color: var(--over);
    font-size: 14px;
    flex-shrink: 0;
  }
  .direction-toggle{
    display: flex;
    background: var(--bg);
    border-radius: 9px;
    padding: 3px;
    gap: 3px;
  }
  .direction-toggle button{
    flex: 1;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 6px;
    border-radius: 7px;
  }
  .direction-toggle button.active.dir-good{
    background: var(--good-soft);
    color: var(--good);
  }
  .direction-toggle button.active.dir-bad{
    background: var(--over-soft);
    color: var(--over);
  }

  .add-nutrient-row{
    display:flex;
    gap: 8px;
    padding: 12px 16px;
  }
  .add-nutrient-row input{
    flex:1;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
  }
  .add-nutrient-row input:focus{ outline:none; border-color: var(--accent); }
  .add-nutrient-row select{
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 13px;
    background: var(--bg);
    color: var(--ink);
  }
  .add-nutrient-row button{
    width: 42px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    font-weight: 700;
  }

  .settings-card{
    background: var(--bg-elevated);
    border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  .reset-link{
    display:block;
    text-align:center;
    color: var(--over);
    font-size: 13.5px;
    font-weight: 600;
    padding: 16px;
    background: none;
    border: none;
    width: 100%;
  }

  /* ---------- Food picker overlay ---------- */
  .picker-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 60;
    display: flex;
    align-items: flex-end;
  }
  .picker-sheet{
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 18px 18px 0 0;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    padding-bottom: var(--safe-bottom);
    animation: sheet-up 0.22s cubic-bezier(.25,.8,.25,1);
  }
  @keyframes sheet-up{
    from{ transform: translateY(100%); }
    to{ transform: translateY(0); }
  }
  .picker-header{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 16px 10px;
    flex-shrink: 0;
  }
  .picker-title{
    font-size: 16px;
    font-weight: 800;
    flex: 1;
  }
  .picker-search{
    flex: 1;
    border: 1px solid var(--line);
    background: var(--bg-elevated);
    border-radius: 999px;
    padding: 11px 16px;
    font-size: 14.5px;
    color: var(--ink);
  }
  .picker-search:focus{ outline: none; border-color: var(--accent); }
  .picker-list{
    overflow-y: auto;
    padding: 4px 0 18px;
    flex: 1;
  }
  .picker-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
  }
  .picker-row:active{ background: var(--track); }
  .picker-row-name{
    font-size: 14.5px;
    font-weight: 600;
  }
  .picker-row-meta{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .picker-row-add{
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 17px;
    flex-shrink: 0;
  }
  .picker-create-row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    color: var(--accent);
    font-weight: 700;
    font-size: 14.5px;
  }
  .picker-create-row .plus-circle{
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .simple-food-row{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .simple-food-row:last-child{ border-bottom: none; }
  .simple-food-remove{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--over-soft);
    color: var(--over);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Toast */
  .toast{
    position: fixed;
    bottom: calc(90px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: white;
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    max-width: calc(100% - 48px);
    text-align: center;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <div class="brand" id="pageTitle">Nutri<span class="dot">Track</span></div>
      <button class="icon-btn hidden" id="editBtn" aria-label="Edit day">✎</button>
    </div>
    <div class="date-nav" id="dateNav">
      <button id="prevDayBtn" aria-label="Previous day">‹</button>
      <div class="date-label" id="dateLabel">
        Today
        <span class="sub" id="dateSub">—</span>
      </div>
      <button id="nextDayBtn" aria-label="Next day">›</button>
    </div>
  </div>

  <!-- ============ DAILY VIEW ============ -->
  <div class="view" id="view-daily">
    <div class="section-head">
      <div class="section-title">Today's intake</div>
    </div>
    <div class="bars-card" id="barsCard"></div>

    <div class="section-head">
      <div class="section-title">Values</div>
    </div>
    <div class="values-card" id="valuesCard"></div>

    <div class="section-head">

<script>
/* =========================================================
   NutriTrack — app logic
   Data model:
   - localStorage["nutritrack_targets"]  -> { id: {name, unit, target} }
   - localStorage["nutritrack_days"]     -> { "YYYY-MM-DD": { foods: [{name, nutrients:{id:amount}}], totals: {id:amount} } }
   totals are DERIVED from foods when foods exist, but a day can also
   have manually-entered totals with no foods (quick logging).
   ========================================================= */

const STORAGE_TARGETS = 'nutritrack_targets';
const STORAGE_DAYS = 'nutritrack_days';
const STORAGE_FOODS = 'nutritrack_foods';

const DEFAULT_TARGETS = {
  energy:   { name: 'Energy',        unit: 'kcal', target: 2100, direction: 'bad' },
  protein:  { name: 'Protein',       unit: 'g',    target: 50,   direction: 'good' },
  carbs:    { name: 'Carbohydrate',  unit: 'g',    target: 275,  direction: 'good' },
  sugar:    { name: 'Sugars',        unit: 'g',    target: 90,   direction: 'bad' },
  fibre:    { name: 'Fibre',         unit: 'g',    target: 30,   direction: 'good' },
  fat:      { name: 'Total fat',     unit: 'g',    target: 70,   direction: 'bad' },
  satfat:   { name: 'Saturated fat', unit: 'g',    target: 24,   direction: 'bad' },
  sodium:   { name: 'Sodium',        unit: 'mg',   target: 2000, direction: 'bad' },
  calcium:  { name: 'Calcium',       unit: 'mg',   target: 1000, direction: 'good' },
  iron:     { name: 'Iron',          unit: 'mg',   target: 8,    direction: 'good' },
};

let state = {
  targets: {},
  days: {},
  savedFoods: {},          // library of saved foods, keyed by id: { name, nutrients: {id: amount} }
  currentDate: todayStr(),
  activeTab: 'daily',
  editingFoods: [],        // working copy of foods while in edit view (day's logged foods, snapshotted)
  editingManualTotals: {}, // working copy of manual totals when no foods logged
};

/* ---------- date helpers ---------- */
function todayStr(){
  return formatDateKey(new Date());
}
function formatDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDateKey(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(dateKey, n){
  const d = parseDateKey(dateKey);
  d.setDate(d.getDate()+n);
  return formatDateKey(d);
}
function prettyDate(dateKey){
  const d = parseDateKey(dateKey);
  const todayKey = todayStr();
  const yestKey = addDays(todayKey, -1);
  if(dateKey === todayKey) return { main: 'Today', sub: longDate(d) };
  if(dateKey === yestKey) return { main: 'Yesterday', sub: longDate(d) };
  const tmrwKey = addDays(todayKey, 1);
  if(dateKey === tmrwKey) return { main: 'Tomorrow', sub: longDate(d) };
  return { main: weekday(d), sub: longDate(d) };
}
function weekday(d){
  return d.toLocaleDateString('en-AU', { weekday: 'long' });
}
function longDate(d){
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

/* ---------- persistence ---------- */
function loadState(){
  try{
    const t = localStorage.getItem(STORAGE_TARGETS);
    state.targets = t ? JSON.parse(t) : structuredCloneSafe(DEFAULT_TARGETS);
  }catch(e){ state.targets = structuredCloneSafe(DEFAULT_TARGETS); }

  try{
    const d = localStorage.getItem(STORAGE_DAYS);
    state.days = d ? JSON.parse(d) : {};
  }catch(e){ state.days = {}; }

  try{
    const f = localStorage.getItem(STORAGE_FOODS);
    state.savedFoods = f ? JSON.parse(f) : {};
  }catch(e){ state.savedFoods = {}; }

  if(!localStorage.getItem(STORAGE_TARGETS)){
    saveTargets();
  }
}
function structuredCloneSafe(obj){ return JSON.parse(JSON.stringify(obj)); }
function saveTargets(){
  localStorage.setItem(STORAGE_TARGETS, JSON.stringify(state.targets));
}
function moveTargetOrder(id, direction){
  // direction: -1 to move up (earlier), +1 to move down (later)
  const entries = Object.entries(state.targets);
  const idx = entries.findIndex(([k]) => k === id);
  const swapIdx = idx + direction;
  if(idx === -1 || swapIdx < 0 || swapIdx >= entries.length) return;
  [entries[idx], entries[swapIdx]] = [entries[swapIdx], entries[idx]];
  state.targets = Object.fromEntries(entries);
  saveTargets();
}
function saveDays(){
  localStorage.setItem(STORAGE_DAYS, JSON.stringify(state.days));
}
function saveSavedFoods(){
  localStorage.setItem(STORAGE_FOODS, JSON.stringify(state.savedFoods));
}
function getDay(dateKey){
  return state.days[dateKey] || { foods: [], totals: {} };
}
function setDay(dateKey, dayData){
  state.days[dateKey] = dayData;
  saveDays();
}
function makeFoodId(name){
  return 'food_' + name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') + '_' + Date.now().toString(36);
}
function upsertSavedFood(id, name, nutrients){
  state.savedFoods[id] = { name, nutrients: nutrients || {} };
  saveSavedFoods();
}
function findSavedFoodByName(name){
  const lower = name.trim().toLowerCase();
  return Object.entries(state.savedFoods).find(([id, f]) => f.name.trim().toLowerCase() === lower);
}

/* ---------- nutrient totals computation ---------- */
function computeTotalsFromFoods(foods){
  const totals = {};
  for(const food of foods){
    for(const [nid, amt] of Object.entries(food.nutrients || {})){
      const n = parseFloat(amt);
      if(!isNaN(n)){
        totals[nid] = (totals[nid] || 0) + n;
      }
    }
  }
  return totals;
}
function getEffectiveTotals(dayData){
  // If there are foods logged, derive totals from them.
  // Otherwise fall back to manually entered totals.
  if(dayData.foods && dayData.foods.length > 0){
    return computeTotalsFromFoods(dayData.foods);
  }
  return dayData.totals || {};
}

/* ---------- toast ---------- */
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

/* =========================================================
   RENDER: Daily view
   ========================================================= */
function renderDateNav(){
  const { main, sub } = prettyDate(state.currentDate);
  document.getElementById('dateLabel').innerHTML = `${main}<span class="sub" id="dateSub">${sub}</span>`;
  const nextBtn = document.getElementById('nextDayBtn');
  nextBtn.disabled = state.currentDate >= todayStr();
}

function pctClass(pct, direction){
  if(direction === 'bad'){
    // Want to stay UNDER target. Green while under, red once over.
    if(pct > 100) return 'over';
    if(pct <= 80) return 'good';
    return 'under'; // 80–100%: getting close, neutral warning zone
  }
  // direction === 'good' (default): want to MEET or EXCEED target.
  // Green once at/over 100%, red the further under you are.
  if(pct >= 100) return 'good';
  if(pct >= 70) return 'under';
  return 'over';
}

function renderBars(){
  const dayData = getDay(state.currentDate);
  const totals = getEffectiveTotals(dayData);
  const card = document.getElementById('barsCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = `<div class="empty-state"><span class="big">⚙️</span>Add nutrients to track in Settings</div>`;
    return;
  }

  card.innerHTML = ids.map(id => {
    const t = state.targets[id];
    const direction = t.direction === 'bad' ? 'bad' : 'good';
    const val = totals[id] || 0;
    const pct = t.target > 0 ? (val / t.target) * 100 : 0;
    const cls = pctClass(pct, direction);
    const displayPct = Math.round(pct);
    const overflowing = pct > 100;

    // Scale: when under/at 100%, the track's full width IS 100%.
    // When over, the track's full width represents the actual pct,
    // so the bar always fills edge-to-edge and a tick mark shows
    // where 100% sits — making overage visible as "tick partway along".
    const scaleMax = Math.max(pct, 100);
    const fillWidth = (pct / scaleMax) * 100;
    const tickLeft = (100 / scaleMax) * 100;

    return `
      <div class="bar-row">
        <div class="bar-top">
          <span class="bar-name">${escapeHtml(t.name)}</span>
          <span class="bar-pct ${cls}">${displayPct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-track-inner">
            <div class="bar-fill ${cls}" style="width:${fillWidth}%"></div>
          </div>
          ${overflowing ? `<div class="tick-100" style="left:${tickLeft}%"></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderValues(){
  const dayData = getDay(state.currentDate);
  const totals = getEffectiveTotals(dayData);
  const card = document.getElementById('valuesCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = '';
    return;
  }

  card.innerHTML = ids.map(id => {
    const t = state.targets[id];
    const val = totals[id] || 0;
    return `
      <div class="value-row">
        <span class="value-name">${escapeHtml(t.name)}</span>
        <span class="value-amount">${formatAmount(val)}${escapeHtml(t.unit)} <span class="target">/ ${formatAmount(t.target)}${escapeHtml(t.unit)}</span></span>
      </div>
    `;
  }).join('');
}

function formatAmount(n){
  if(n === undefined || n === null || isNaN(n)) return '0';
  const rounded = Math.round(n * 10) / 10;
  return rounded % 1 === 0 ? String(rounded) : rounded.toFixed(1);
}

function renderFoods(){
  const dayData = getDay(state.currentDate);
  const card = document.getElementById('foodCard');

  if(!dayData.foods || dayData.foods.length === 0){
    card.innerHTML = `<div class="empty-state"><span class="big">🍽️</span>No foods logged yet</div>`;
    return;
  }

  card.innerHTML = dayData.foods.map(food => {
    const nutrientBits = Object.entries(food.nutrients || {})
      .filter(([id, amt]) => state.targets[id] && parseFloat(amt) > 0)
      .map(([id, amt]) => `${formatAmount(amt)}${state.targets[id].unit} ${state.targets[id].name.toLowerCase()}`)
      .join(' · ');
    return `
      <div class="food-row">
        <div class="food-emoji">🍴</div>
        <div class="food-info">
          <div class="food-name">${escapeHtml(food.name)}</div>
          <div class="food-meta">${nutrientBits || 'No nutrients logged'}</div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function renderDailyView(){
  renderDateNav();
  renderBars();
  renderValues();
  renderFoods();
}

/* =========================================================
   RENDER: Edit view
   ========================================================= */
function openEditView(){
  const dayData = getDay(state.currentDate);
  // Work from a deep copy of existing foods
  state.editingFoods = dayData.foods && dayData.foods.length > 0
    ? JSON.parse(JSON.stringify(dayData.foods))
    : [];
  state.editingManualTotals = !dayData.foods || dayData.foods.length === 0
    ? JSON.parse(JSON.stringify(dayData.totals || {}))
    : {};

  renderFoodEntries();
  renderNutrientForm();
  switchView('edit');
}

function renderFoodEntries(){
  const wrap = document.getElementById('foodEntries');

  if(state.editingFoods.length === 0){
    wrap.innerHTML = `<div class="empty-state"><span class="big">🍴</span>No foods yet — add one below</div>`;
    return;
  }

  wrap.innerHTML = state.editingFoods.map((food, idx) => {
    const nutrientBits = Object.entries(food.nutrients || {})
      .filter(([id, amt]) => state.targets[id] && parseFloat(amt) > 0)
      .map(([id, amt]) => `${formatAmount(amt)}${state.targets[id].unit} ${state.targets[id].name.toLowerCase()}`)
      .join(' · ');
    return `
      <div class="simple-food-row">
        <div class="food-emoji">🍴</div>
        <div class="food-info">
          <div class="food-name">${escapeHtml(food.name)}</div>
          <div class="food-meta">${nutrientBits || 'No nutrients logged'}</div>
        </div>
        <button class="simple-food-remove" data-remove-idx="${idx}">✕</button>
      </div>
    `;
  }).join('');

  wrap.querySelectorAll('[data-remove-idx]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.removeIdx);
      state.editingFoods.splice(idx, 1);
      renderFoodEntries();
      renderNutrientForm();
    });
  });
}

function renderNutrientForm(){
  const form = document.getElementById('nutrientForm');
  const ids = Object.keys(state.targets);
  const hasFoods = state.editingFoods.length > 0;

  if(ids.length === 0){
    form.innerHTML = `<div class="empty-state">Add nutrients to track in Settings</div>`;
    return;
  }

  if(hasFoods){
    // totals are derived & read-only, shown for confirmation
    const totals = computeTotalsFromFoods(state.editingFoods);
    form.innerHTML = ids.map(id => {
      const t = state.targets[id];
      const val = totals[id] || 0;
      return `
        <div class="form-row">
          <span class="form-label">${escapeHtml(t.name)}</span>
          <div class="form-input-wrap">
            <span class="form-input" style="color:var(--ink-soft);">${formatAmount(val)}</span>
            <span class="form-unit">${escapeHtml(t.unit)}</span>
          </div>
        </div>
      `;
    }).join('') + `<div class="form-row" style="border-top:1px solid var(--line); padding-top:10px;"><span class="form-label" style="color:var(--ink-faint); font-size:12.5px;">Totals are calculated from foods listed above</span></div>`;
  } else {
    form.innerHTML = ids.map(id => {
      const t = state.targets[id];
      const val = state.editingManualTotals[id] != null ? state.editingManualTotals[id] : '';
      return `
        <div class="form-row">
          <span class="form-label">${escapeHtml(t.name)}</span>
          <div class="form-input-wrap">
            <input type="number" inputmode="decimal" step="any" min="0" class="form-input manual-total-input"
              data-nutrient-id="${id}" value="${val}" placeholder="0">
            <span class="form-unit">${escapeHtml(t.unit)}</span>
          </div>
        </div>
      `;
    }).join('');

    form.querySelectorAll('.manual-total-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const nid = e.target.dataset.nutrientId;
        state.editingManualTotals[nid] = e.target.value === '' ? 0 : parseFloat(e.target.value);
      });
    });
  }
}

/* =========================================================
   Food picker overlay
   ========================================================= */
function openFoodPicker(){
  const overlay = document.getElementById('foodPickerOverlay');
  const search = document.getElementById('pickerSearch');
  search.value = '';
  renderPickerList('');
  overlay.classList.remove('hidden');
  setTimeout(() => search.focus(), 50);
}
function closeFoodPicker(){
  document.getElementById('foodPickerOverlay').classList.add('hidden');
}

function renderPickerList(query){
  const list = document.getElementById('pickerList');
  const q = query.trim().toLowerCase();
  const entries = Object.entries(state.savedFoods)
    .filter(([id, f]) => !q || f.name.toLowerCase().includes(q))
    .sort((a, b) => a[1].name.localeCompare(b[1].name));

  let html = '';

  if(entries.length === 0 && !q){
    html += `<div class="empty-state"><span class="big">🍽️</span>No saved foods yet — type a name above to create one</div>`;
  } else {
    html += entries.map(([id, f]) => {
      const nutrientBits = Object.entries(f.nutrients || {})
        .filter(([nid, amt]) => state.targets[nid] && parseFloat(amt) > 0)
        .map(([nid, amt]) => `${formatAmount(amt)}${state.targets[nid].unit} ${state.targets[nid].name.toLowerCase()}`)
        .join(' · ');
      return `
        <div class="picker-row" data-pick-food-id="${id}">
          <div class="food-info">
            <div class="picker-row-name">${escapeHtml(f.name)}</div>
            <div class="picker-row-meta">${nutrientBits || 'No nutrients set'}</div>
          </div>
          <button class="picker-row-add" data-pick-food-id="${id}">+</button>
        </div>
      `;
    }).join('');
  }

  // "create new" option whenever there's a query that doesn't exactly match an existing saved food
  const exactMatch = entries.find(([id, f]) => f.name.toLowerCase() === q);
  if(q && !exactMatch){
    html += `
      <div class="picker-create-row" data-create-food-name="${escapeHtml(query.trim())}">
        <span class="plus-circle">+</span>
        Create "${escapeHtml(query.trim())}"
      </div>
    `;
  }

  list.innerHTML = html;

  list.querySelectorAll('[data-pick-food-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.pickFoodId;
      addSavedFoodToToday(id);
    });
  });
  const createRow = list.querySelector('[data-create-food-name]');
  if(createRow){
    createRow.addEventListener('click', () => {
      openNewFoodDetail(createRow.dataset.createFoodName);
    });
  }
}

function addSavedFoodToToday(savedFoodId){
  const saved = state.savedFoods[savedFoodId];
  if(!saved) return;
  state.editingFoods.push({ name: saved.name, nutrients: JSON.parse(JSON.stringify(saved.nutrients || {})) });
  closeFoodPicker();
  renderFoodEntries();
  renderNutrientForm();
  showToast(`Added ${saved.name}`);
}

/* ---------- New / edit food detail (defining nutrients for a food) ---------- */
let newFoodMode = 'create'; // 'create' (from day edit, adds to today) | 'settings-edit' (edit existing) | 'settings-create' (new, library only)
let newFoodEditingId = null;

function openNewFoodDetail(prefillName, editSavedFoodId){
  closeFoodPicker();
  const overlay = document.getElementById('newFoodOverlay');
  const titleEl = document.getElementById('newFoodTitle');
  const saveBtn = document.getElementById('newFoodSaveBtn');
  const nameInput = document.getElementById('newFoodNameInput');

  if(editSavedFoodId){
    newFoodMode = 'settings-edit';
    newFoodEditingId = editSavedFoodId;
    const saved = state.savedFoods[editSavedFoodId];
    titleEl.textContent = 'Edit food';
    saveBtn.textContent = 'Save';
    nameInput.value = saved ? saved.name : '';
    renderNewFoodNutrients(saved ? saved.nutrients : {});
  } else {
    newFoodMode = 'create';
    newFoodEditingId = null;
    titleEl.textContent = 'New food';
    saveBtn.textContent = 'Save & add to today';
    nameInput.value = prefillName || '';
    renderNewFoodNutrients({});
  }

  overlay.classList.remove('hidden');
  setTimeout(() => {
    if(!prefillName) nameInput.focus();
  }, 50);
}
function openNewFoodFromSettings(){
  closeFoodPicker();
  const overlay = document.getElementById('newFoodOverlay');
  newFoodMode = 'settings-create';
  newFoodEditingId = null;
  document.getElementById('newFoodTitle').textContent = 'New food';
  document.getElementById('newFoodSaveBtn').textContent = 'Save';
  document.getElementById('newFoodNameInput').value = '';
  renderNewFoodNutrients({});
  overlay.classList.remove('hidden');
  setTimeout(() => document.getElementById('newFoodNameInput').focus(), 50);
}
function closeNewFoodDetail(){
  document.getElementById('newFoodOverlay').classList.add('hidden');
}
function renderNewFoodNutrients(values){
  const wrap = document.getElementById('newFoodNutrients');
  const ids = Object.keys(state.targets);
  wrap.innerHTML = ids.map(id => {
    const t = state.targets[id];
    const val = values && values[id] != null ? values[id] : '';
    return `
      <div class="chip-input">
        <label>${escapeHtml(t.name)}</label>
        <input type="number" inputmode="decimal" step="any" min="0"
          data-new-food-nutrient="${id}" value="${val}" placeholder="0">
        <span class="u">${escapeHtml(t.unit)}</span>
      </div>
    `;
  }).join('');
}
function saveNewFoodAndAdd(){
  const name = document.getElementById('newFoodNameInput').value.trim();
  if(!name){
    showToast('Enter a food name');
    return;
  }
  const nutrients = {};
  document.querySelectorAll('[data-new-food-nutrient]').forEach(inp => {
    const id = inp.dataset.newFoodNutrient;
    const v = parseFloat(inp.value);
    nutrients[id] = isNaN(v) ? 0 : v;
  });

  if(newFoodMode === 'settings-edit' && newFoodEditingId){
    upsertSavedFood(newFoodEditingId, name, nutrients);
    closeNewFoodDetail();
    renderSavedFoodsSettings();
    showToast(`Saved ${name}`);
    return;
  }

  if(newFoodMode === 'settings-create'){
    const existing = findSavedFoodByName(name);
    const id = existing ? existing[0] : makeFoodId(name);
    upsertSavedFood(id, name, nutrients);
    closeNewFoodDetail();
    renderSavedFoodsSettings();
    showToast(`Saved ${name}`);
    return;
  }

  // create mode: save to library (or update if name matches an existing saved food), then add to today
  const existing = findSavedFoodByName(name);
  const id = existing ? existing[0] : makeFoodId(name);
  upsertSavedFood(id, name, nutrients);

  state.editingFoods.push({ name, nutrients: JSON.parse(JSON.stringify(nutrients)) });
  closeNewFoodDetail();
  renderFoodEntries();
  renderNutrientForm();
  showToast(`Saved & added ${name}`);
}

function saveEditView(){
  const cleanedFoods = state.editingFoods
    .filter(f => f.name && f.name.trim().length > 0)
    .map(f => ({ name: f.name.trim(), nutrients: f.nutrients || {} }));

  const dayData = {
    foods: cleanedFoods,
    totals: cleanedFoods.length === 0 ? (state.editingManualTotals || {}) : {}
  };
  setDay(state.currentDate, dayData);
  showToast('Saved');
  switchView('daily');
  renderDailyView();
}

/* =========================================================
   RENDER: Settings view
   ========================================================= */
function renderSettings(){
  renderTargetsSettings();
  renderSavedFoodsSettings();
}

function renderTargetsSettings(){
  const card = document.getElementById('targetsCard');
  const ids = Object.keys(state.targets);

  if(ids.length === 0){
    card.innerHTML = `<div class="empty-state">No nutrients yet — add one below</div>`;
    return;
  }

  card.innerHTML = ids.map((id, idx) => {
    const t = state.targets[id];
    const direction = t.direction === 'bad' ? 'bad' : 'good';
    const isFirst = idx === 0;
    const isLast = idx === ids.length - 1;
    return `
      <div class="nutrient-setting-row">
        <div class="nutrient-setting-top">
          <div class="reorder-stack">
            <button class="reorder-btn" data-move-id="${id}" data-move-dir="-1" ${isFirst ? 'disabled' : ''} aria-label="Move up">▲</button>
            <button class="reorder-btn" data-move-id="${id}" data-move-dir="1" ${isLast ? 'disabled' : ''} aria-label="Move down">▼</button>
          </div>
          <span class="nutrient-setting-name">${escapeHtml(t.name)}</span>
          <input type="number" inputmode="decimal" step="any" min="0"
            data-target-id="${id}" class="target-input" value="${t.target}">
          <span class="nutrient-setting-unit">${escapeHtml(t.unit)}</span>
          <button class="remove-nutrient-btn" data-remove-target="${id}">✕</button>
        </div>
        <div class="direction-toggle">
          <button type="button" class="dir-good ${direction === 'good' ? 'active' : ''}" data-direction-id="${id}" data-direction-value="good">More is better</button>
          <button type="button" class="dir-bad ${direction === 'bad' ? 'active' : ''}" data-direction-id="${id}" data-direction-value="bad">Less is better</button>
        </div>
      </div>
    `;
  }).join('');

  card.querySelectorAll('[data-move-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.moveId;
      const dir = parseInt(e.currentTarget.dataset.moveDir);
      moveTargetOrder(id, dir);
      renderTargetsSettings();
      renderDailyView();
    });
  });

  card.querySelectorAll('[data-direction-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.dataset.directionId;
      const val = e.target.dataset.directionValue;
      state.targets[id].direction = val;
      saveTargets();
      renderSettings();
    });
  });

  card.querySelectorAll('.target-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = e.target.dataset.targetId;
      const v = parseFloat(e.target.value);
      state.targets[id].target = isNaN(v) ? 0 : v;
      saveTargets();
    });
  });
  card.querySelectorAll('[data-remove-target]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.dataset.removeTarget;
      const name = state.targets[id].name;
      if(confirm(`Remove "${name}" from tracked nutrients? Past logged amounts for it will be hidden but not deleted.`)){
        delete state.targets[id];
        saveTargets();
        renderSettings();
      }
    });
  });
}

function renderSavedFoodsSettings(){
  const card = document.getElementById('savedFoodsCard');
  const entries = Object.entries(state.savedFoods).sort((a, b) => a[1].name.localeCompare(b[1].name));

  if(entries.length === 0){
    card.innerHTML = `<div class="empty-state">No saved foods yet — add one below</div>`;
    return;
  }

  card.innerHTML = entries.map(([id, f]) => {
    const nutrientBits = Object.entries(f.nutrients || {})
      .filter(([nid, amt]) => state.targets[nid] && parseFloat(amt) > 0)
      .map(([nid, amt]) => `${formatAmount(amt)}${state.targets[nid].unit} ${state.targets[nid].name.toLowerCase()}`)
      .join(' · ');
    return `
      <div class="simple-food-row" data-edit-saved-food="${id}">
        <div class="food-emoji">🍴</div>
        <div class="food-info">
          <div class="food-name">${escapeHtml(f.name)}</div>
          <div class="food-meta">${nutrientBits || 'No nutrients set'}</div>
        </div>
        <button class="simple-food-remove" data-remove-saved-food="${id}">✕</button>
      </div>
    `;
  }).join('');

  card.querySelectorAll('[data-edit-saved-food]').forEach(row => {
    row.addEventListener('click', e => {
      if(e.target.closest('[data-remove-saved-food]')) return;
      openNewFoodDetail(null, row.dataset.editSavedFood);
    });
  });
  card.querySelectorAll('[data-remove-saved-food]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = e.target.dataset.removeSavedFood;
      const name = state.savedFoods[id].name;
      if(confirm(`Remove "${name}" from saved foods? Days you've already logged it on are unaffected.`)){
        delete state.savedFoods[id];
        saveSavedFoods();
        renderSavedFoodsSettings();
      }
    });
  });
}

function addNutrientFromSettings(){
  const nameInput = document.getElementById('newNutrientName');
  const unitSelect = document.getElementById('newNutrientUnit');
  const name = nameInput.value.trim();
  if(!name){
    showToast('Enter a nutrient name');
    return;
  }
  const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') + '_' + Date.now().toString(36);
  state.targets[id] = { name, unit: unitSelect.value, target: 0, direction: 'good' };
  saveTargets();
  nameInput.value = '';
  renderSettings();
  showToast(`Added ${name}`);
}

function resetAllData(){
  if(confirm('This will erase all logged days and reset targets to defaults. This cannot be undone. Continue?')){
    localStorage.removeItem(STORAGE_TARGETS);
    localStorage.removeItem(STORAGE_DAYS);
    loadState();
    renderDailyView();
    renderSettings();
    showToast('All data erased');
    switchView('daily');
  }
}

/* =========================================================
   View / Tab switching
   ========================================================= */
function switchView(view){
  // view: 'daily' | 'edit' | 'settings'
  document.getElementById('view-daily').classList.toggle('hidden', view !== 'daily');
  document.getElementById('view-edit').classList.toggle('hidden', view !== 'edit');
  document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');

  document.getElementById('dateNav').classList.toggle('hidden', view === 'settings');
  document.getElementById('editBtn').classList.toggle('hidden', view !== 'daily');
  document.getElementById('fabEdit').classList.toggle('hidden', view !== 'daily');

  const titleEl = document.getElementById('pageTitle');
  if(view === 'edit'){
    titleEl.innerHTML = 'Edit day';
  } else if(view === 'settings'){
    titleEl.innerHTML = 'Settings';
  } else {
    titleEl.innerHTML = 'Nutri<span class="dot">Track</span>';
  }

  document.querySelectorAll('.nav-item').forEach(btn => {
    const tab = btn.dataset.tab;
    const isActive = (view === 'daily' && tab === 'daily') || (view === 'settings' && tab === 'settings');
    btn.classList.toggle('active', isActive);
  });

  if(view === 'settings'){
    state.activeTab = 'settings';
    switchSettingsTab('nutrients');
  } else if(view === 'daily'){
    state.activeTab = 'daily';
  }
}

function switchSettingsTab(tab){
  // tab: 'nutrients' | 'food' | 'data'
  document.querySelectorAll('.settings-panel').forEach(panel => {
    panel.classList.toggle('hidden', panel.id !== `settingsPanel-${tab}`);
  });
  document.querySelectorAll('.settings-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.settingsTab === tab);
  });
  state.activeSettingsTab = tab;
}

/* =========================================================
   Init & event bindings
   ========================================================= */
function init(){
  loadState();
  renderDailyView();
  renderSettings();
  switchView('daily');

  document.getElementById('prevDayBtn').addEventListener('click', () => {
    state.currentDate = addDays(state.currentDate, -1);
    renderDailyView();
  });
  document.getElementById('nextDayBtn').addEventListener('click', () => {
    if(state.currentDate < todayStr()){
      state.currentDate = addDays(state.currentDate, 1);
      renderDailyView();
    }
  });

  document.getElementById('editBtn').addEventListener('click', openEditView);
  document.getElementById('fabEdit').addEventListener('click', openEditView);
  document.getElementById('addFoodBtn').addEventListener('click', openFoodPicker);
  document.getElementById('saveEditBtn').addEventListener('click', saveEditView);

  document.getElementById('pickerCloseBtn').addEventListener('click', closeFoodPicker);
  document.getElementById('foodPickerOverlay').addEventListener('click', e => {
    if(e.target.id === 'foodPickerOverlay') closeFoodPicker();
  });
  document.getElementById('pickerSearch').addEventListener('input', e => {
    renderPickerList(e.target.value);
  });

  document.getElementById('newFoodCloseBtn').addEventListener('click', closeNewFoodDetail);
  document.getElementById('newFoodOverlay').addEventListener('click', e => {
    if(e.target.id === 'newFoodOverlay') closeNewFoodDetail();
  });
  document.getElementById('newFoodSaveBtn').addEventListener('click', saveNewFoodAndAdd);

  document.getElementById('addNutrientBtn').addEventListener('click', addNutrientFromSettings);
  document.getElementById('addSavedFoodBtn').addEventListener('click', openNewFoodFromSettings);
  document.getElementById('resetDataBtn').addEventListener('click', resetAllData);

  document.querySelectorAll('.settings-tab').forEach(btn => {
    btn.addEventListener('click', () => switchSettingsTab(btn.dataset.settingsTab));
  });

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      if(tab === 'daily'){
        renderDailyView();
        switchView('daily');
      } else if(tab === 'settings'){
        renderSettings();
        switchView('settings');
      }
    });
  });

  // swipe between days on the daily view
  let touchStartX = null;
  const dailyView = document.getElementById('view-daily');
  dailyView.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  dailyView.addEventListener('touchend', e => {
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 60){
      if(dx < 0 && state.currentDate < todayStr()){
        state.currentDate = addDays(state.currentDate, 1);
        renderDailyView();
      } else if(dx > 0){
        state.currentDate = addDays(state.currentDate, -1);
        renderDailyView();
      }
    }
    touchStartX = null;
  }, { passive: true });
}

document.addEventListener('DOMContentLoaded', init);

</script>
